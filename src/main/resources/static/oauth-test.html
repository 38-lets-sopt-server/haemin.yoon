<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Google вАюЖиИВЮИ ьЁїВіцьіИ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Apple SD Gothic Neo', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            padding: 48px 40px;
            width: 400px;
            text-align: center;
        }
        h2 { font-size: 20px; color: #333; margin-bottom: 32px; }
        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 15px;
            color: #333;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .google-btn:hover { background: #f8f8f8; }
        .google-btn img { width: 20px; height: 20px; }
        .result {
            margin-top: 32px;
            text-align: left;
            display: none;
        }
        .result h3 { font-size: 15px; color: #4caf50; margin-bottom: 12px; }
        .result pre {
            background: #f5f5f5;
            border-radius: 6px;
            padding: 16px;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .error h3 { color: #f44336; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Google ВєїВЁю вАюЖиИВЮИ ьЁїВіцьіИ</h2>
        <a href="/api/v1/auth/google/authorize" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            GoogleвАю вАюЖиИВЮИ
        </a>
        <div class="result" id="result">
            <h3 id="result-title"></h3>
            <pre id="result-body"></pre>
        </div>
    </div>

    <script>
        // Вйюв░▒Вю╝вАю вЈїВЋёВЎћВЮё вЋї URLВЌљ codeЖ░ђ ВъѕВю╝вЕ┤ Вёюв▓ёВЌљ ВъљвЈЎ ВџћВ▓Г
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');

        if (error) {
            showResult(false, { error });
        } else if (code) {
            fetch('/api/v1/auth/google/callback?code=' + encodeURIComponent(code))
                .then(res => res.json())
                .then(data => showResult(true, data))
                .catch(err => showResult(false, { error: err.message }));
        }

        function showResult(success, data) {
            const resultEl = document.getElementById('result');
            const titleEl = document.getElementById('result-title');
            const bodyEl = document.getElementById('result-body');

            resultEl.style.display = 'block';
            resultEl.className = 'result' + (success ? '' : ' error');
            titleEl.textContent = success ? 'вАюЖиИВЮИ Вё▒Ж│х!' : 'вАюЖиИВЮИ ВІцьїе';
            bodyEl.textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
