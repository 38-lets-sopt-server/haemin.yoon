server:
  forward-headers-strategy: framework

spring:
  application:
    name: assignment

  data:
    redis:
      host: ${REDIS_HOST:localhost}  # 환경변수 없으면 localhost 기본값 사용
      port: ${REDIS_PORT:6379}
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100
        one-indexed-parameters: false

  datasource:
    url: jdbc:mysql://localhost:3306/assignment
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true  # JPQL → SQL 변환 추적용 (PR 쿼리 비교 시 유용)
    show-sql: true

  springdoc:
    swagger-ui:
      path: /swagger-ui.html            # 실제 접속 경로
      display-request-duration: true    # API 호출 시 소요 시간 표시 (성능 체크용)
      groups-order: DESC                # 최근 생성된 API가 위로 오도록 정렬
    default-consume-media-type: application/json
    default-produce-media-type: application/json

security:
  jwt:
    secret: ${JWT_SECRET_KEY}
    access-token-expires-in-seconds: 1800     # 30분
    refresh-token-expires-in-seconds: 1209600 # 2주
